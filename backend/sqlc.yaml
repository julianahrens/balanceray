version: "2"
sql:
  - engine: postgresql
    schema: "sql/migrations/"
    queries: "sql/queries/"
    gen:
      go:
        package: "db"
        out: "internal/repository/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        overrides:
          - db_type: "numeric"
            nullable: true
            go_type: "github.com/shopspring/decimal.Decimal"
          - column: "assets.live_price"
            go_type: "github.com/jilio/gqlgen-scalars/scalar.Decimal"
          - column: "etf_asset_holdings.percentage"
            go_type: "github.com/jilio/gqlgen-scalars/scalar.Decimal"
          - column: "etf_country_allocations.percentage"
            go_type: "github.com/jilio/gqlgen-scalars/scalar.Decimal"
