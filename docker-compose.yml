services:
  postgres:
    image: postgres:16-alpine
    container_name: balanceray_postgres
    environment:
      POSTGRES_USER: balanceray_user
      POSTGRES_PASSWORD: balanceray_password
      POSTGRES_DB: balanceray_dev
    ports:
      - "5432:5432"
    volumes:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balanceray_user -d balanceray_dev"]
      interval: 3s
      timeout: 3s
      retries: 5
